# DTOT Prep — app stack. The shared Caddy reverse proxy lives in its own "edge"
# stack (separate compose); both attach to the external "edge" network, and
# Caddy reaches this app by container name (dtot:3000).
#
#   docker network create edge   # once, shared across all stacks
#   docker compose up -d --build
services:
  app:
    build: .
    image: dtot-prep:latest
    container_name: dtot
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:/data/app.db"
      NODE_ENV: "production"
    volumes:
      - dtot-data:/data
    networks:
      - edge
    # No host ports: reached only via the edge Caddy (dtot:3000).

  db:
    image: postgres:16-alpine
    profiles: ["postgres"]
    container_name: dtot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dtot
      POSTGRES_PASSWORD: dtot
      POSTGRES_DB: dtot
    volumes:
      - dtot-pgdata:/var/lib/postgresql/data
    networks:
      - edge

networks:
  edge:
    external: true

volumes:
  dtot-data:
    external: true # holds the SQLite DB
  dtot-pgdata:
