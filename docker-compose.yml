# DTOT Prep — container stack: app + Caddy reverse proxy, for a multi-app host.
#
#   docker network create edge       # once, shared across all app stacks
#   docker compose up -d --build
#
# Caddy terminates HTTP/HTTPS on the LAN and proxies to app containers over the
# shared external "edge" network (by container name). Add more apps by attaching
# their containers to "edge" and adding a site block to ./Caddyfile.
services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      # Bound to the LAN IP so exposure stays LAN-scoped (Docker bypasses ufw).
      - "192.168.50.202:80:80"
      - "192.168.50.202:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge

  app:
    build: .
    image: dtot-prep:latest
    container_name: dtot
    restart: unless-stopped
    environment:
      DATABASE_URL: "file:/data/app.db"
      NODE_ENV: "production"
    volumes:
      - dtot-data:/data
    networks:
      - edge
    # No host ports: reached only via Caddy on the edge network (dtot:3000).

  db:
    image: postgres:16-alpine
    profiles: ["postgres"]
    container_name: dtot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dtot
      POSTGRES_PASSWORD: dtot
      POSTGRES_DB: dtot
    volumes:
      - dtot-pgdata:/var/lib/postgresql/data
    networks:
      - edge

networks:
  edge:
    external: true

volumes:
  dtot-data:
    external: true # holds the SQLite DB; created/migrated out of band
  caddy-data:
  caddy-config:
  dtot-pgdata:
